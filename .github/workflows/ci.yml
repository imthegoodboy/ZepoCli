name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build and test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify compiled CLI
        run: npm run verify:cli

      - name: Verify installed package
        run: npm run verify:package

      - name: Remove build output before package test
        run: rm -rf dist

      - name: Package dry-run
        run: npm pack --dry-run
